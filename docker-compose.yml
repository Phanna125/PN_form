services:
  postgres:
    image: postgres:16-alpine
    container_name: pn_form_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pn_form
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pn_form_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pn_form"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pn_form_postgres_data:
